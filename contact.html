<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | nesteye.ai</title>
    <meta name="description" content="Get in touch with nesteye.ai — Edge AI for smarter poultry health.">
    <link rel="canonical" href="https://nesteye.ai/contact.html">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nesteye.ai/contact.html">
    <meta property="og:title" content="Contact | nesteye.ai">
    <meta property="og:description" content="Get in touch with nesteye.ai — Edge AI for smarter poultry health.">
    <meta name="twitter:card" content="summary">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body class="font-mono bg-cream text-[#1A1A1A] antialiased min-h-screen flex flex-col">

    <nav class="sticky top-0 z-50 bg-cream/90 backdrop-blur-md border-b border-forest/10">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between gap-4">
            <a href="index.html" class="inline-flex items-center px-3 py-1.5 rounded-md border border-forest/15 bg-white shadow-sm">
                <span class="font-extrabold text-sm tracking-tight text-forest">nesteye.ai</span>
            </a>
            <div class="hidden sm:flex items-center gap-6 text-xs font-bold uppercase tracking-widest text-forest/70">
                <a href="index.html#features" class="hover:text-forest transition-colors">Features</a>
                <a href="index.html#how-it-works" class="hover:text-forest transition-colors">How It Works</a>
                <a href="index.html#traction" class="hover:text-forest transition-colors">Traction</a>
            </div>
            <div class="flex items-center gap-2">
                <a href="contact.html"
                   class="hidden sm:inline-flex px-4 py-2 text-xs font-bold uppercase tracking-widest bg-forest text-white rounded">
                    Contact
                </a>
                <button id="mobile-menu-btn" class="sm:hidden p-2 text-forest" aria-label="Open menu">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="sm:hidden hidden border-t border-forest/10 bg-cream/95 backdrop-blur-md">
            <div class="px-4 py-4 space-y-3">
                <a href="index.html#features" class="block text-sm font-bold uppercase tracking-widest text-forest/70 hover:text-forest">Features</a>
                <a href="index.html#how-it-works" class="block text-sm font-bold uppercase tracking-widest text-forest/70 hover:text-forest">How It Works</a>
                <a href="index.html#traction" class="block text-sm font-bold uppercase tracking-widest text-forest/70 hover:text-forest">Traction</a>
                <a href="contact.html" class="block w-full text-center px-4 py-3 text-xs font-bold uppercase tracking-widest bg-forest text-white rounded">Contact</a>
            </div>
        </div>
    </nav>

    <main class="flex-1 py-16 sm:py-24">
        <div class="max-w-xl mx-auto px-4 sm:px-6">
            <div class="text-center mb-10">
                <p class="text-xs font-bold uppercase tracking-[0.3em] text-forest/60 mb-2">Reach Out</p>
                <h1 class="font-serif text-3xl sm:text-4xl font-semibold text-forest">Get in Touch</h1>
                <p class="mt-4 text-sm text-forest/70 leading-relaxed">
                    Have a question about our Edge AI system or interested in a pilot? Send us a message and we'll get back to you.
                </p>
            </div>

            <form id="contact-form" action="https://api.web3forms.com/submit" method="POST" class="bg-white rounded-lg p-6 sm:p-8 shadow-sm space-y-6">
                <input type="hidden" name="access_key" value="95905d41-685d-4ab0-bb50-7ffcd54a0a3d">
                <input type="hidden" name="subject" id="form-subject" value="New contact from nesteye.ai">
                <input type="hidden" name="from_name" value="nesteye.ai Contact Form">
                <input type="checkbox" name="botcheck" class="hidden" style="display:none">

                <div>
                    <label for="name" class="block text-xs font-bold uppercase tracking-widest text-forest/60 mb-2">Name</label>
                    <input type="text" id="name" name="name" required
                           class="w-full px-4 py-3 text-sm border border-forest/20 rounded bg-cream focus:outline-none focus:border-forest transition-colors"
                           placeholder="Your name">
                </div>

                <div>
                    <label for="email" class="block text-xs font-bold uppercase tracking-widest text-forest/60 mb-2">Email</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-4 py-3 text-sm border border-forest/20 rounded bg-cream focus:outline-none focus:border-forest transition-colors"
                           placeholder="you@example.com">
                </div>

                <div>
                    <label for="question" class="block text-xs font-bold uppercase tracking-widest text-forest/60 mb-2">Subject</label>
                    <input type="text" id="question" name="question" required
                           class="w-full px-4 py-3 text-sm border border-forest/20 rounded bg-cream focus:outline-none focus:border-forest transition-colors"
                           placeholder="What would you like to know?">
                </div>

                <div>
                    <label for="message" class="block text-xs font-bold uppercase tracking-widest text-forest/60 mb-2">Message</label>
                    <textarea id="message" name="message" rows="6" required
                              class="w-full px-4 py-3 text-sm border border-forest/20 rounded bg-cream focus:outline-none focus:border-forest transition-colors resize-y"
                              placeholder="Tell us more about your barn, flock size, or interest in a pilot..."></textarea>
                </div>

                <button type="submit" id="submit-btn"
                        class="w-full px-8 py-3 text-sm font-bold uppercase tracking-widest bg-forest text-white rounded hover:bg-forest-dark transition-colors">
                    Send Message
                </button>

                <div id="form-status" class="hidden text-center text-sm py-2 rounded"></div>
            </form>
        </div>
    </main>

    <footer class="bg-stone border-t border-forest/10 py-8">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center">
            <a href="index.html" class="text-xs text-forest/60 hover:text-forest transition-colors uppercase tracking-widest">&larr; Back to nesteye.ai</a>
            <p class="mt-4 text-xs text-forest/40 uppercase tracking-widest">&copy; 2026 nesteye.ai</p>
        </div>
    </footer>

    <script>
        // Mobile menu
        (function() {
            var btn = document.getElementById('mobile-menu-btn');
            var menu = document.getElementById('mobile-menu');
            if (!btn || !menu) return;
            btn.addEventListener('click', function() {
                menu.classList.toggle('hidden');
            });
        })();

        // Pre-fill subject from URL param
        (function() {
            var params = new URLSearchParams(window.location.search);
            var interest = params.get('interest');
            if (interest === 'pilot') {
                document.getElementById('question').value = 'Interested in a pilot';
                document.getElementById('form-subject').value = '[nesteye.ai] Pilot inquiry';
            }
        })();

        // Form submission with fetch
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var form = e.target;
            var btn = document.getElementById('submit-btn');
            var status = document.getElementById('form-status');

            btn.disabled = true;
            btn.textContent = 'Sending...';

            fetch(form.action, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(Object.fromEntries(new FormData(form)))
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    status.textContent = 'Message sent successfully! We will get back to you soon.';
                    status.className = 'text-center text-sm py-2 rounded bg-green-tint text-forest';
                    form.reset();
                } else {
                    status.textContent = 'Something went wrong. Please email contact@nesteye.ai directly.';
                    status.className = 'text-center text-sm py-2 rounded bg-red-50 text-coral';
                }
            })
            .catch(function() {
                status.textContent = 'Network error. Please email contact@nesteye.ai directly.';
                status.className = 'text-center text-sm py-2 rounded bg-red-50 text-coral';
            })
            .finally(function() {
                btn.disabled = false;
                btn.textContent = 'Send Message';
                status.classList.remove('hidden');
            });
        });
    </script>

</body>
</html>
